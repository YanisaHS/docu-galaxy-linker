<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuGalaxy — {{ title }}</title>
  <script src="/static/js/cytoscape.min.js"></script>
  <style>
    :root {
      --bg: #0e1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --danger: #f85149;

      /* Diátaxis category colours */
      --c-tutorial:     #ffd700;   /* gold */
      --c-how-to:       #56d364;   /* green */
      --c-explanation:  #58a6ff;   /* blue */
      --c-reference:    #bc8cff;   /* purple */

      --e-cross-ref:      #58a6ff;
      --e-shared-concept: #56d364;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ---- Sidebar ---- */
    #sidebar {
      width: 270px;
      min-width: 200px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px 12px;
      gap: 16px;
      z-index: 10;
    }

    #sidebar h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
    #sidebar h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .sidebar-section { display: flex; flex-direction: column; gap: 4px; }

    /* ---- Stats ---- */
    #stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }
    .stat-card .val { font-size: 20px; font-weight: 700; color: var(--accent); }
    .stat-card .lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* ---- Controls ---- */
    #search-input {
      width: 100%;
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-info { font-size: 11px; color: var(--muted); min-height: 16px; }

    select, button {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
    }
    select:focus, button:focus { outline: 2px solid var(--accent); }
    button:hover { background: var(--border); }
    .btn-row { display: flex; gap: 6px; }
    .btn-row button { flex: 1; }

    /* ---- Legend ---- */
    .legend-item {
      display: flex; align-items: center; gap: 8px; padding: 2px 0;
      cursor: pointer; border-radius: 4px; padding: 3px 4px;
    }
    .legend-item:hover { background: var(--border); }
    .legend-item.hidden-section { opacity: 0.4; }

    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .legend-line {
      width: 18px; height: 2px; flex-shrink: 0; border-radius: 1px;
    }
    .legend-count {
      margin-left: auto; font-size: 10px; color: var(--muted);
    }

    /* ---- Edge type toggles ---- */
    .edge-toggle-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    .edge-toggle-row input { width: auto; cursor: pointer; }

    /* ---- Info panel ---- */
    #info-panel {
      position: absolute;
      bottom: 16px; right: 16px;
      width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      z-index: 20;
      display: none;
      max-height: 65vh;
      overflow-y: auto;
    }
    #info-panel.visible { display: block; }
    #info-panel h3 {
      font-size: 13px; font-weight: 600; color: var(--accent);
      margin-bottom: 8px; line-height: 1.4;
    }
    .info-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 12px; }
    .info-key { color: var(--muted); min-width: 80px; flex-shrink: 0; }
    .info-val { word-break: break-word; }

    #info-panel #info-close {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none; color: var(--muted);
      font-size: 16px; cursor: pointer; width: auto; padding: 0;
    }

    .headings-list {
      margin-top: 6px; font-size: 11px; color: var(--muted);
      padding-left: 12px;
    }
    .headings-list li { padding: 1px 0; }

    #info-neighbours { margin-top: 10px; }
    #info-neighbours h4 { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    #info-neighbours ul { list-style: none; padding: 0; }
    #info-neighbours li {
      font-size: 11px; padding: 2px 0; color: var(--text); cursor: pointer;
    }
    #info-neighbours li:hover { color: var(--accent); }

    /* ---- Canvas ---- */
    #canvas-area {
      flex: 1; display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }
    #cy { flex: 1; background: var(--bg); }

    /* ---- Loading ---- */
    #loading {
      position: absolute; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; flex-direction: column; gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-banner {
      display: none; position: absolute; top: 12px; left: 50%;
      transform: translateX(-50%);
      background: #3d1e1e; border: 1px solid var(--danger);
      border-radius: 6px; padding: 8px 16px; color: var(--danger);
      z-index: 50; font-size: 12px;
    }

    /* ---- Edge tooltip ---- */
    #edge-tooltip {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text);
      pointer-events: none;
      z-index: 30;
      display: none;
      max-width: 260px;
    }
    #edge-tooltip strong { color: var(--accent); }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span style="color:var(--muted)">Building concept map…</span>
</div>

<div id="error-banner"></div>
<div id="edge-tooltip"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-section">
    <h1>DocuGalaxy</h1>
    <span style="color:var(--muted); font-size:11px">Landscape Concept Map</span>
  </div>

  <div class="sidebar-section">
    <h2>Statistics</h2>
    <div id="stats-grid">
      <div class="stat-card"><div class="val" id="stat-nodes">—</div><div class="lbl">Pages</div></div>
      <div class="stat-card"><div class="val" id="stat-edges">—</div><div class="lbl">All links</div></div>
      <div class="stat-card"><div class="val" id="stat-xref">—</div><div class="lbl">Cross-refs</div></div>
      <div class="stat-card"><div class="val" id="stat-sim">—</div><div class="lbl">Topic overlaps</div></div>
    </div>
  </div>

  <div class="sidebar-section">
    <h2>Search</h2>
    <input id="search-input" type="search" placeholder="Filter topics by name…" />
    <span id="search-info"></span>
  </div>

  <div class="sidebar-section">
    <h2>Layout</h2>
    <select id="layout-select">
      <option value="cose" selected>CoSE (force-directed)</option>
      <option value="concentric">Concentric</option>
      <option value="breadthfirst">Breadth-first</option>
      <option value="circle">Circle</option>
      <option value="grid">Grid</option>
    </select>
    <div class="btn-row" style="margin-top:4px">
      <button id="btn-run-layout">Re-run layout</button>
      <button id="btn-fit">Fit view</button>
    </div>
  </div>

  <div class="sidebar-section">
    <h2>Edge types</h2>
    <div class="edge-toggle-row">
      <input type="checkbox" id="toggle-cross-ref" checked />
      <div class="legend-line" style="background:var(--e-cross-ref)"></div>
      <label for="toggle-cross-ref">Cross-references</label>
    </div>
    <div class="edge-toggle-row">
      <input type="checkbox" id="toggle-shared-concept" checked />
      <div class="legend-line" style="background:var(--e-shared-concept); border-top: 2px dashed var(--e-shared-concept); height:0; margin-top:1px"></div>
      <label for="toggle-shared-concept">Topic overlaps</label>
    </div>
  </div>

  <div class="sidebar-section">
    <h2>Diátaxis type <span style="font-size:10px;color:var(--muted)">(click to toggle)</span></h2>
    <div id="section-legend"></div>
  </div>
</div>

<!-- Canvas -->
<div id="canvas-area">
  <div id="cy"></div>

  <div id="info-panel">
    <button id="info-close">✕</button>
    <h3 id="info-title"></h3>
    <div id="info-body"></div>
    <div id="info-headings"></div>
    <div id="info-neighbours"></div>
  </div>
</div>

<script src="/static/js/concept-map.js"></script>
</body>
</html>
